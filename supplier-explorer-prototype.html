<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supplier Explorer – Prototype</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5; display: flex; flex-direction: column;
    align-items: center; min-height: 100vh; padding: 20px;
  }
  /* ── Page context ── */
  .page-context {
    width: 100%; max-width: 1120px; background: #fff;
    border: 1px solid #ddd; border-radius: 8px;
    padding: 16px 20px; margin-bottom: 16px;
  }
  .ctx-top { display: flex; align-items: center; justify-content: space-between; }
  .ctx-top h3 { font-size: 13px; color: #555; font-weight: 500; }
  .ctx-top strong { color: #222; }
  .trigger-btns { display: flex; gap: 10px; }
  .trigger-btn {
    padding: 7px 16px; border-radius: 6px; font-size: 13px; cursor: pointer;
    border: 1px solid #c85c00; background: #c85c00; color: #fff;
    font-weight: 500; transition: background .15s;
  }
  .trigger-btn:hover { background: #a34800; }
  .trigger-btn.secondary { background: #fff; color: #c85c00; }
  .trigger-btn.secondary:hover { background: #fff5ee; }
  /* ── Autofill preview ── */
  .autofill-preview {
    display: none; margin-top: 12px; background: #f0faf0;
    border: 1px solid #b8e0bc; border-radius: 8px; padding: 12px 16px;
  }
  .autofill-preview.visible { display: block; }
  .af-heading { font-size: 11px; font-weight: 700; color: #2d7a3a;
    text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  .af-fields { display: flex; gap: 24px; flex-wrap: wrap; }
  .af-field { display: flex; flex-direction: column; }
  .af-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: .4px; }
  .af-value { font-size: 13px; font-weight: 600; color: #1a1a1a; }
  /* ── Overlay ── */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .overlay.active { opacity: 1; pointer-events: all; }
  /* ── Modal ── */
  .modal {
    background: #fff; border-radius: 12px;
    width: 96vw; max-width: 1080px; height: 88vh; max-height: 720px;
    display: flex; flex-direction: column;
    box-shadow: 0 24px 64px rgba(0,0,0,.28);
    transform: translateY(16px); transition: transform .2s; overflow: hidden;
  }
  .overlay.active .modal { transform: translateY(0); }
  /* ── Modal header ── */
  .modal-header {
    padding: 14px 20px; border-bottom: 1px solid #eee;
    display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  .modal-title { font-size: 15px; font-weight: 700; color: #1a1a1a; white-space: nowrap; }
  .modal-ctx { font-size: 12px; color: #aaa; white-space: nowrap; }
  .search-wrap { flex: 1; position: relative; }
  .search-wrap input {
    width: 100%; padding: 8px 12px 8px 34px; border: 1px solid #ddd;
    border-radius: 8px; font-size: 13px; color: #222; outline: none;
    transition: border-color .15s;
  }
  .search-wrap input:focus { border-color: #c85c00; box-shadow: 0 0 0 3px rgba(200,92,0,.1); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #bbb; font-size: 14px; }
  .close-btn {
    width: 30px; height: 30px; border-radius: 50%; border: none;
    background: #f2f2f2; cursor: pointer; font-size: 15px; color: #666;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: background .15s;
  }
  .close-btn:hover { background: #e4e4e4; color: #222; }
  /* ── Modal body ── */
  .modal-body { display: flex; flex: 1; overflow: hidden; }
  /* ── Filters ── */
  .filters {
    width: 228px; flex-shrink: 0; border-right: 1px solid #eee;
    overflow-y: auto; background: #fafafa; padding: 14px;
    display: flex; flex-direction: column; gap: 0;
  }
  .filter-section-title {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .7px; color: #bbb; margin-bottom: 10px; margin-top: 4px;
  }
  .filter-section-title.second { margin-top: 16px; padding-top: 14px; border-top: 1px solid #eee; }
  .filter-group { margin-bottom: 12px; }
  .filter-label { font-size: 12px; font-weight: 600; color: #444; display: block; margin-bottom: 5px; }
  .filter-select {
    width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 6px;
    font-size: 12px; color: #333; background: #fff; outline: none;
    transition: border-color .15s; cursor: pointer;
  }
  .filter-select:focus { border-color: #c85c00; }
  .filter-group.hidden { display: none; }
  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0 6px; border-top: 1px solid #eee; margin-top: 8px;
  }
  .toggle-label { font-size: 12px; color: #555; }
  .toggle { position: relative; width: 34px; height: 18px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; inset: 0; background: #ccc; border-radius: 18px;
    cursor: pointer; transition: background .2s;
  }
  .toggle-slider:before {
    content: ''; position: absolute; width: 14px; height: 14px;
    left: 2px; top: 2px; background: #fff; border-radius: 50%;
    transition: transform .2s;
  }
  .toggle input:checked + .toggle-slider { background: #c85c00; }
  .toggle input:checked + .toggle-slider:before { transform: translateX(16px); }
  .result-count { font-size: 11px; color: #bbb; margin-top: 6px; }
  .clear-btn {
    width: 100%; padding: 7px; margin-top: 10px; border: 1px solid #ddd;
    border-radius: 6px; background: #fff; font-size: 12px; color: #888;
    cursor: pointer; transition: all .15s;
  }
  .clear-btn:hover { border-color: #c85c00; color: #c85c00; background: #fff8f4; }
  /* ── Results ── */
  .results {
    flex: 1; overflow-y: auto; padding: 14px;
    display: flex; flex-direction: column; gap: 10px;
  }
  /* ── Supplier card ── */
  .supplier-card { border: 1px solid #e4e4e4; border-radius: 10px; background: #fff; overflow: hidden; transition: box-shadow .15s; }
  .supplier-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.07); }
  .supplier-header {
    padding: 12px 16px; display: flex; align-items: center;
    justify-content: space-between; cursor: pointer; user-select: none;
    transition: background .15s;
  }
  .supplier-header:hover { background: #fff8f4; }
  .supplier-header.expanded { background: #fff8f4; border-bottom: 1px solid #f0e8e0; }
  .supplier-left { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 0; }
  .supplier-name { font-size: 14px; font-weight: 600; color: #1a1a1a; }
  .unavail-note { font-size: 11px; font-weight: 500; }
  .unavail-note.disabled { color: #e05252; }
  .unavail-note.closed { color: #d08000; }
  .supplier-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .badge {
    display: inline-flex; align-items: center; padding: 2px 7px;
    border-radius: 10px; font-size: 11px; font-weight: 500; white-space: nowrap;
  }
  .b-cat  { background: #fff0e6; color: #b84d00; }
  .b-grade { background: #f0f7ff; color: #1a6fc4; }
  .b-loc  { background: #f0faf0; color: #2a7035; }
  .b-hotel { background: #fffbe6; color: #a07000; }
  .b-lang { background: #f5f0ff; color: #6b3fa0; }
  .supplier-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; margin-left: 12px; }
  .svc-count { font-size: 12px; color: #aaa; }
  .chevron { font-size: 11px; color: #bbb; transition: transform .2s; }
  .chevron.open { transform: rotate(180deg); }
  /* ── Services ── */
  .services-list { display: none; }
  .services-list.open { display: block; }
  .svc-table { width: 100%; border-collapse: collapse; }
  .svc-table thead tr { background: #f8f8f8; border-bottom: 1px solid #eee; }
  .svc-table th {
    padding: 7px 14px; font-size: 10px; text-transform: uppercase;
    letter-spacing: .5px; color: #aaa; text-align: left; font-weight: 700;
  }
  .svc-table th:nth-child(2), .svc-table th:nth-child(3) { text-align: right; }
  .svc-table th:last-child { text-align: right; }
  .svc-table td { padding: 10px 14px; font-size: 13px; color: #333; border-bottom: 1px solid #f4f4f4; vertical-align: top; }
  .svc-table tr:last-child td { border-bottom: none; }
  .svc-table tbody tr:hover td { background: #fdf8f5; }
  .svc-name { font-weight: 500; color: #1a1a1a; margin-bottom: 2px; }
  .svc-sub { font-size: 11px; color: #aaa; }
  .td-right { text-align: right; }
  .price-cost { font-size: 13px; color: #666; }
  .price-quote { font-size: 13px; font-weight: 600; color: #1a6fc4; }
  .select-btn {
    padding: 6px 14px; background: #c85c00; color: #fff; border: none;
    border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer;
    transition: background .15s; white-space: nowrap;
  }
  .select-btn:hover { background: #a34800; }
  /* ── Empty ── */
  .empty-state {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; color: #ccc; gap: 8px; padding: 60px 20px;
  }
  .empty-icon { font-size: 40px; }
  .empty-text { font-size: 14px; color: #aaa; }
  .empty-sub { font-size: 12px; color: #ccc; }
  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: #1a1a1a; color: #fff; padding: 10px 20px;
    border-radius: 8px; font-size: 13px; opacity: 0;
    transition: opacity .2s, transform .2s; pointer-events: none;
    z-index: 9999; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

// ── State ─────────────────────────────────────────────────────────────────────
let expandedCards = new Set();
let modalMode = 'sales';
// ── Open / close ──────────────────────────────────────────────────────────────
function openModal(mode) {
  modalMode = mode;
  document.getElementById('modalCtx').textContent =
    mode === 'sales' ? '· Proposal Editor' : '· Bookings List';
  document.getElementById('overlay').classList.add('active');
  expandedCards.clear();
  applyFilters();
}
function closeModal() {
  document.getElementById('overlay').classList.remove('active');
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}
// ── Category change ───────────────────────────────────────────────────────────
function onCategoryChange() {
  const v = document.getElementById('fCategory').value;
  const g = document.getElementById('hotelCatGroup');
  g.classList.toggle('hidden', v !== 'Hotel');
  if (v !== 'Hotel') document.getElementById('fHotelCat').value = '';
  applyFilters();
}
// ── Clear filters ─────────────────────────────────────────────────────────────
function clearFilters() {
  ['fLocation','fCategory','fHotelCat','fGrade','fLanguage','fAvgBookings','fSvcCategory','fSvcSubcat']
    .forEach(id => document.getElementById(id).value = '');
  document.getElementById('searchInput').value = '';
  document.getElementById('toggleUnavail').checked = false;
  document.getElementById('hotelCatGroup').classList.add('hidden');
  applyFilters();
}
// ── Filter + render ───────────────────────────────────────────────────────────
function applyFilters() {
  const search    = document.getElementById('searchInput').value.toLowerCase().trim();
  const location  = document.getElementById('fLocation').value;
  const category  = document.getElementById('fCategory').value;
  const hotelCat  = document.getElementById('fHotelCat').value;
  const grade     = document.getElementById('fGrade').value;
  const lang      = document.getElementById('fLanguage').value;
  const svcCat    = document.getElementById('fSvcCategory').value;
  const svcSub    = document.getElementById('fSvcSubcat').value;
  const avgBookings = parseInt(document.getElementById('fAvgBookings').value) || 0;
  const showUnavail = document.getElementById('toggleUnavail').checked;
  const filtered = SUPPLIERS
    .filter(s => {
      if (!s.approved) return false;
      if (!showUnavail && (s.disabled || s.tempClosed)) return false;
      if (search   && !s.name.toLowerCase().includes(search)) return false;
      if (location && s.location !== location) return false;
      if (category && !s.categories.includes(category)) return false;
      if (hotelCat && s.hotelCategory !== hotelCat) return false;
      if (grade    && s.grade !== grade) return false;
      if (lang     && !s.languages.includes(lang)) return false;
      if (avgBookings && (s.avgBookingsPerMonth || 0) < avgBookings) return false;
      // Service-level filters: supplier must have at least one matching service
      if (svcCat || svcSub) {
        const match = s.services.some(sv => {
          if (!sv.approved) return false;
          if (!showUnavail && (sv.disabled || sv.tempClosed)) return false;
          if (svcCat && sv.category !== svcCat) return false;
          if (svcSub && sv.subcat   !== svcSub) return false;
          return true;
        });
        if (!match) return false;
      }
      return true;
    });
  // Auto-expand when 1–2 results
  if (filtered.length <= 2) filtered.forEach(s => expandedCards.add(s.id));
  renderResults(filtered, showUnavail, svcCat, svcSub);
  document.getElementById('resultCount').textContent =
    filtered.length === 0 ? 'No results'
    : `${filtered.length} supplier${filtered.length !== 1 ? 's' : ''}`;
}
// ── Render ────────────────────────────────────────────────────────────────────
function renderResults(list, showUnavail, svcCat, svcSub) {
  const el = document.getElementById('resultsList');
  if (!list.length) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-text">No suppliers match your filters</div>
        <div class="empty-sub">Try adjusting or clearing the filters</div>
      </div>`;
    return;
  }
  el.innerHTML = list.map(s => {
    const isOpen = expandedCards.has(s.id);
    const unavailTag = s.disabled
      ? `<span class="unavail-note disabled"> · Disabled</span>`
      : s.tempClosed
        ? `<span class="unavail-note closed"> · Temporarily closed</span>`
        : '';
    const catBadges = s.categories.map(c =>
      `<span class="badge b-cat">${c}</span>`).join('');
    const hotelBadge = s.hotelCategory
      ? `<span class="badge b-hotel">${s.hotelCategory}★</span>` : '';
    const langBadge = s.categories.some(c => c === 'Guide')
      ? `<span class="badge b-lang">🗣 ${s.languages.join(', ')}</span>` : '';
    // Filter services for display
    const visibleSvcs = s.services.filter(sv => {
      if (!sv.approved) return false;
      if (!showUnavail && (sv.disabled || sv.tempClosed)) return false;
      if (svcCat && sv.category !== svcCat) return false;
      if (svcSub && sv.subcat   !== svcSub) return false;
      return true;
    });
    const rows = visibleSvcs.map(sv => {
      const sName = sv.name.replace(/'/g,"&#39;");
      const supName = s.name.replace(/'/g,"&#39;");
      return `
        <tr>
          <td>
            <div class="svc-name">${sv.name}</div>
            <div class="svc-sub">${sv.category} · ${sv.subcat}</div>
          </td>
          <td class="td-right"><span class="price-cost">$${sv.cost}</span></td>
          <td class="td-right"><span class="price-quote">$${sv.quote}</span></td>
          <td class="td-right">
            <button class="select-btn"
              onclick="selectService('${supName}','${sName}',${sv.cost},${sv.quote})">
              Select
            </button>
          </td>
        </tr>`;
    }).join('');
    return `
    <div class="supplier-card" id="card-${s.id}">
      <div class="supplier-header ${isOpen ? 'expanded' : ''}" onclick="toggleCard(${s.id})">
        <div class="supplier-left">
          <div>
            <span class="supplier-name">${s.name}</span>${unavailTag}
          </div>
          <div class="supplier-meta">
            ${catBadges}
            <span class="badge b-grade">${s.grade}</span>
            <span class="badge b-loc">📍 ${s.location}</span>
            ${hotelBadge}
            ${langBadge}
          </div>
        </div>
        <div class="supplier-right">
          <span class="svc-count">${visibleSvcs.length} service${visibleSvcs.length !== 1 ? 's' : ''}</span>
          <span class="chevron ${isOpen ? 'open' : ''}">▼</span>
        </div>
      </div>
      <div class="services-list ${isOpen ? 'open' : ''}" id="svcs-${s.id}">
        <table class="svc-table">
          <thead><tr>
            <th>Service</th>
            <th style="text-align:right">Unit Cost</th>
            <th style="text-align:right">Unit Quote</th>
            <th></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');
}
// ── Toggle expand ─────────────────────────────────────────────────────────────
function toggleCard(id) {
  const header  = document.querySelector(`#card-${id} .supplier-header`);
  const list    = document.getElementById(`svcs-${id}`);
  const chevron = header.querySelector('.chevron');
  if (expandedCards.has(id)) {
    expandedCards.delete(id);
    header.classList.remove('expanded');
    list.classList.remove('open');
    chevron.classList.remove('open');
  } else {
    expandedCards.add(id);
    header.classList.add('expanded');
    list.classList.add('open');
    chevron.classList.add('open');
  }
}
// ── Select + autofill ─────────────────────────────────────────────────────────
function selectService(supplier, service, cost, quote) {
  document.getElementById('af-supplier').textContent = supplier;
  document.getElementById('af-service').textContent  = service;
  document.getElementById('af-cost').textContent     = `$${cost}`;
  document.getElementById('af-quote').textContent    = `$${quote}`;
  document.getElementById('autofillPreview').classList.add('visible');
  closeModal();
  showToast(`✓ "${service}" selected · fields autofilled`);
}
// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
